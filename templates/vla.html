{% extends "base.html" %}

{% block title %}VLA Training Center{% endblock %}

{% block head %}
<style>
    .vla-container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        height: calc(100vh - 100px);
    }

    .video-panel {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .main-feed {
        width: 100%;
        background: #000;
        border-radius: 8px;
        aspect-ratio: 16/9;
        object-fit: contain;
        position: relative;
    }

    .secondary-feeds {
        display: flex;
        gap: 16px;
        height: 150px;
    }

    .secondary-feed {
        width: 200px;
        background: #000;
        border-radius: 8px;
        object-fit: cover;
    }

    .control-panel {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        overflow-y: auto;
    }

    .status-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-header {
        font-size: 0.9em;
        color: var(--text-secondary);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .status-value {
        font-size: 1.4em;
        font-weight: 600;
        color: var(--text-primary);
    }

    .record-controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .input-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px;
        border-radius: 8px;
        color: white;
        font-family: inherit;
    }

    .btn.record {
        background: #ef4444;
        color: white;
    }

    .btn.record:hover {
        background: #dc2626;
    }

    .btn.record.recording {
        background: #fee2e2;
        color: #ef4444;
        animation: pulse 2s infinite;
    }

    .btn.discard {
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    .dataset-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .dataset-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 12px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9em;
    }

    @keyframes pulse {
        0% {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }

        70% {
            box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }

        100% {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
    }

    .recording-indicator {
        position: absolute;
        top: 10px;
        right: 10px;
        background: red;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 12px;
        display: none;
        align-items: center;
        gap: 6px;
    }

    background: white;
    border-radius: 50%;
    }

    .training-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .log-box {
        background: #000;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 10px;
        height: 150px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 0.8em;
        color: #0f0;
        white-space: pre-wrap;
    }

    progress {
        width: 100%;
        height: 10px;
        border-radius: 5px;
        appearance: none;
    }

    progress::-webkit-progress-bar {
        background-color: #333;
        border-radius: 5px;
    }

    progress::-webkit-progress-value {
        background-color: #2563eb;
        border-radius: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="vla-container">
    <div class="video-panel">
        <div style="position: relative;">
            <img src="/video_feed" class="main-feed" alt="Main Camera">
            <div id="recording-badge" class="recording-indicator">REC</div>
        </div>
        <div class="secondary-feeds">
            <img src="/video_feed_right" class="secondary-feed" alt="Wrist Camera">
            <!-- Add depth/other sensors later -->
        </div>
    </div>

    <div class="control-panel">
        <div class="status-card">
            <div class="status-header">System Status</div>
            <div class="status-value" id="system-status">Ready</div>
        </div>

        <div class="record-controls">
            <div class="status-header">Data Collection</div>

            <div class="input-group">
                <label>Task Name</label>
                <input type="text" id="dataset-name" class="input-field" placeholder="pickup_cup">
            </div>

            <button id="record-btn" class="btn record" onclick="toggleRecording()">
                Start Recording
            </button>

            <button id="discard-btn" class="btn discard" onclick="deleteLastEpisode()">
                Delete Last Episode
            </button>

            <div style="font-size: 0.9em; color: var(--text-secondary); text-align: center; margin-top: 8px;">
                Curent Episode Frames: <span id="frame-count">0</span>
            </div>
        </div>

        <div class="dataset-list">
            <div class="status-header">Recent Datasets</div>
            <!-- Populated by JS -->
            <div id="dataset-list-content"></div>
        </div>

        <!-- Training Removed -->

        <div class="dataset-list">
            <div class="status-header">Execution</div>

            <div class="input-group">
                <label>Upload New Model</label>
                <div
                    style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
                    <div style="margin-bottom: 12px;">
                        <label style="font-size: 0.8em; color: #aaa; display: block; margin-bottom: 4px;">1. Model File
                            (.pth)</label>
                        <input type="file" id="upload-pth" accept=".pth" class="input-field"
                            style="width: 100%; box-sizing: border-box;">
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="font-size: 0.8em; color: #aaa; display: block; margin-bottom: 4px;">2. Stats File
                            (.json)</label>
                        <input type="file" id="upload-json" accept=".json" class="input-field"
                            style="width: 100%; box-sizing: border-box;">
                    </div>
                    <button id="upload-submit-btn" class="btn discard"
                        style="width: 100%; background: #333; justify-content: center;" onclick="uploadModelTuple()">
                        Upload Files
                    </button>
                </div>
            </div>

            <div class="input-group">
                <label>Select Model</label>
                <div style="display: flex; gap: 8px;">
                    <select id="exec-model" class="input-field" style="background: rgba(255,255,255,0.1); flex: 1;">
                        <option value="">Loading...</option>
                    </select>
                    <button class="btn discard"
                        style="width: 40px; padding: 0; display: flex; align-items: center; justify-content: center;"
                        title="Delete Model" onclick="deleteModel()">
                        🗑️
                    </button>
                </div>
            </div>

            <button id="exec-btn" class="btn record" style="background: #059669;" onclick="toggleExecution()">
                Run Model
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let isRecording = false;
    let isExecuting = false;
    let pollInterval = null;

    async function updateStatus() {
        try {
            const response = await fetch('/api/vla/status');
            const data = await response.json();

            if (data.recorder) {
                const rec = data.recorder;
                isRecording = rec.recording;
                document.getElementById('frame-count').textContent = rec.frames;

                const btn = document.getElementById('record-btn');
                const badge = document.getElementById('recording-badge');
                const discardBtn = document.getElementById('discard-btn');

                if (isRecording) {
                    btn.textContent = 'Stop Recording';
                    btn.classList.add('recording');
                    badge.style.display = 'flex';
                    discardBtn.textContent = 'Discard Current Episode';
                    discardBtn.style.display = 'block';
                    document.getElementById('system-status').textContent = 'Recording ' + rec.dataset + ' / ' + rec.episode;
                } else {
                    btn.textContent = 'Start Recording';
                    btn.classList.remove('recording');
                    badge.style.display = 'none';

                    discardBtn.textContent = 'Delete Last Episode';
                    discardBtn.style.display = 'block';

                    discardBtn.textContent = 'Delete Last Episode';
                    discardBtn.style.display = 'block';

                    if (!isExecuting) {
                        document.getElementById('system-status').textContent = 'Ready';
                    }
                }
            }

            // Training status logic removed

            if (data.execution) {
                isExecuting = true;
                document.getElementById('system-status').textContent = 'EXECUTING MODEL...';
                const execBtn = document.getElementById('exec-btn');
                execBtn.textContent = 'Stop Execution';
                execBtn.style.background = '#dc2626';
            } else {
                isExecuting = false;
                const execBtn = document.getElementById('exec-btn');
                execBtn.textContent = 'Run Model';
                execBtn.style.background = '#059669';
            }

        } catch (e) {
            console.error(e);
        }
    }

    async function loadDatasets() {
        try {
            const res = await fetch('/api/vla/datasets');
            const data = await res.json();
            const list = document.getElementById('dataset-list-content');

            list.innerHTML = '';

            data.datasets.forEach(name => {
                const item = document.createElement('div');
                item.className = 'dataset-item';

                const nameSpan = document.createElement('span');
                nameSpan.textContent = name;

                const dlLink = document.createElement('a');
                dlLink.href = `/api/vla/dataset/${name}/download`;
                dlLink.textContent = '⬇️ ZIP';
                dlLink.style.color = '#60a5fa';
                dlLink.style.textDecoration = 'none';
                dlLink.style.marginRight = '10px';

                const delBtn = document.createElement('span');
                delBtn.textContent = '🗑️';
                delBtn.style.cursor = 'pointer';
                delBtn.title = 'Delete Dataset';
                delBtn.onclick = () => deleteDataset(name);

                const actions = document.createElement('div');
                actions.appendChild(dlLink);
                actions.appendChild(delBtn);

                item.appendChild(nameSpan);
                item.appendChild(actions);
                list.appendChild(item);
            });

            if (data.datasets.length === 0) {
                list.innerHTML = '<div style="color: grey; padding: 10px;">No datasets found</div>';
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function loadModels() {
        try {
            const res = await fetch('/api/vla/models');
            const data = await res.json();
            const select = document.getElementById('exec-model');
            select.innerHTML = '';

            data.models.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });

            if (data.models.length === 0) {
                select.innerHTML = '<option value="">No models found</option>';
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function toggleExecution() {
        if (!isExecuting) {
            const model = document.getElementById('exec-model').value;
            if (!model) return alert("Select a model");

            const res = await fetch('/api/vla/execute/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: model })
            });
            const data = await res.json();
            if (data.status !== 'ok') {
                alert('Error: ' + data.error);
            }
        } else {
            await fetch('/api/vla/execute/stop', { method: 'POST' });
        }
        updateStatus();
    }

    // Training functions removed

    async function uploadModelTuple() {
        const pthInput = document.getElementById('upload-pth');
        const jsonInput = document.getElementById('upload-json');

        if (!pthInput.files.length) {
            return alert("Please select a .pth model file.");
        }

        const btn = document.getElementById('upload-submit-btn');
        const originalText = btn.textContent;
        btn.disabled = true;

        const uploadFile = async (file) => {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/vla/model/upload', {
                method: 'POST',
                body: formData
            });
            return await res.json();
        };

        try {
            // 1. Upload Model
            btn.textContent = "Uploading Model...";
            const res1 = await uploadFile(pthInput.files[0]);
            if (res1.status !== 'ok') throw new Error("Model upload failed: " + res1.error);

            // 2. Upload Stats (if present)
            if (jsonInput.files.length) {
                btn.textContent = "Uploading Stats...";
                const res2 = await uploadFile(jsonInput.files[0]);
                if (res2.status !== 'ok') throw new Error("Stats upload failed: " + res2.error);
            }

            alert("Upload complete!");
            pthInput.value = '';
            jsonInput.value = '';
            loadModels(); // Refresh list
        } catch (e) {
            console.error(e);
            alert(e.message);
        } finally {
            btn.textContent = originalText;
            btn.disabled = false;
        }
    }

    async function toggleRecording() {
        const btn = document.getElementById('record-btn');
        const nameInput = document.getElementById('dataset-name');

        if (!isRecording) {
            const name = nameInput.value;
            const res = await fetch('/api/vla/record/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            const data = await res.json();
            if (data.status !== 'ok') {
                alert('Error: ' + data.error);
            }
        } else {
            const res = await fetch('/api/vla/record/stop', { method: 'POST' });
            setTimeout(loadDatasets, 1000);
        }
        updateStatus();
    }

    async function deleteLastEpisode() {
        if (isRecording) {
            if (confirm('Discard CURRENT recording in progress?')) {
                await fetch('/api/vla/record/delete_last', { method: 'POST' });
                updateStatus();
            }
        } else {
            if (confirm('Delete the LAST recorded episode?')) {
                await fetch('/api/vla/record/delete_last', { method: 'POST' });
                updateStatus();
            }
        }
    }

    async function deleteDataset(name) {
        if (!confirm(`Are you sure you want to delete dataset "${name}"? This cannot be undone.`)) return;

        try {
            const res = await fetch('/api/vla/dataset/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                loadDatasets();
            } else {
                alert('Error: ' + data.error);
            }
        } catch (e) {
            console.error(e);
            alert('Delete failed');
        }
    }

    async function deleteModel() {
        const select = document.getElementById('exec-model');
        const name = select.value;
        if (!name) return;

        if (!confirm(`Are you sure you want to delete model "${name}"? This cannot be undone.`)) return;

        try {
            const res = await fetch('/api/vla/model/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                loadModels();
            } else {
                alert('Error: ' + data.error);
            }
        } catch (e) {
            console.error(e);
            alert('Delete failed');
        }
    }

    // Start polling
    setInterval(updateStatus, 1000);
    updateStatus();
    loadDatasets();
    loadModels();
</script>
{% endblock %}
